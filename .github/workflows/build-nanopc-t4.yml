name: Build NanoPC-T4 Ubuntu Server

on:
  push:
    tags:
      - 't4-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo -S -p '' apt-get update
        sudo -S -p '' apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu bc bison flex libssl-dev make libncurses-dev u-boot-tools qemu-user-static libarchive-dev
    
    - name: Clone sd-fuse_rk3399 (kernel 6.6.y)
      run: git clone --depth 1 -b kernel-6.6.y https://github.com/friendlyarm/sd-fuse_rk3399.git work/sd-fuse_rk3399
    
    - name: Download Ubuntu Noble Core (Server版)
      run: |
        cd work/sd-fuse_rk3399
        wget -q https://downloads.friendlyelec.com/os-images/rk3399/images/ubuntu-noble-core-arm64-images-20260421.tgz
        tar xvzf ubuntu-noble-core-arm64-images-20260421.tgz
    
    - name: Build SD image
      run: |
        cd work/sd-fuse_rk3399
        ./mk-sd-image.sh ubuntu-noble-core-arm64
    
    - name: Rename and collect firmware
      run: |
        cd work/sd-fuse_rk3399/out
        ls -lh *.img
        mv rk3399-sd-ubuntu-noble-core-*.img nanopc-t4-ubuntu-server-24.04.4.img
        ls -lh *.img
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: "NanoPC-T4 Ubuntu Server ${{ github.ref_name }}"
        body: |
          ## NanoPC-T4 Ubuntu Server 24.04.4 LTS
          
          - 内核: Linux 6.6.y (LTS)
          - 启动方式: eMMC引导 + NVMe系统
          - 在线升级: 支持
          
          ### 刷机方法
          1. 先将固件刷入eMMC（USB线刷）
          2. 从eMMC启动后运行: sudo bash scripts/migrate-to-nvme.sh
          3. 重启设备，Boot在eMMC，系统在NVMe
          
          ### 注意
          - RK3399不支持NVMe直接启动（硬件限制）
          - Boot必须保留在eMMC或SD卡上
        files: work/sd-fuse_rk3399/out/*.img
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

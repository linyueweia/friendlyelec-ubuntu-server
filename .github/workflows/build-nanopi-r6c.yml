name: Build NanoPi R6C Ubuntu Server

on:
  push:
    tags:
      - 'r6c-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo -S -p '' apt-get update
        sudo -S -p '' apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
          bc bison flex libssl-dev make libncurses-dev u-boot-tools \
          qemu-user-static libarchive-dev
    
    - name: Clone sd-fuse_rk3588 (kernel 6.1.y)
      run: git clone --depth 1 -b kernel-6.1.y https://github.com/friendlyarm/sd-fuse_rk3588.git work/sd-fuse_rk3588
    
    - name: Download Ubuntu Noble Minimal (Server版)
      run: |
        cd work/sd-fuse_rk3588
        wget -q https://downloads.friendlyelec.com/os-images/rk3588/images/ubuntu-noble-minimal-arm64-images-20260717.tgz
        tar xvzf ubuntu-noble-minimal-arm64-images-20260717.tgz
    
    - name: Build SD image
      run: |
        cd work/sd-fuse_rk3588
        ./mk-sd-image.sh ubuntu-noble-minimal-arm64
    
    - name: Rename firmware
      run: |
        cd work/sd-fuse_rk3588/out
        mv rk3588-sd-ubuntu-noble-minimal-*.img nanopi-r6c-ubuntu-server-24.04.4.img
        ls -lh *.img
    
    - name: Compress firmware
      run: |
        cd work/sd-fuse_rk3588/out
        gzip *.img
        ls -lh *.img.gz
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: "NanoPi R6C Ubuntu Server 24.04.4"
        body: |
          ## NanoPi R6C Ubuntu Server 24.04.4 LTS
          
          - 内核: Linux 6.1.y (LTS)
          - 刷机: 直接用写盘工具写入NVMe硬盘，插上就能启动
        files: work/sd-fuse_rk3588/out/*.img.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
